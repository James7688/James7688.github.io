<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exploring Venus &ndash; Mission Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',Arial,sans-serif; color:#fff; }
    canvas { display:block; }

    #overlay {
      position:fixed; inset:0; pointer-events:none;
      display:flex; align-items:center; justify-content:flex-start;
      padding:4vw; z-index:10;
    }
    #panel {
      max-width:500px; width:100%;
      background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,200,100,0.22);
      backdrop-filter:blur(16px);
      border-radius:20px; padding:24px 28px;
      box-shadow:0 0 40px rgba(255,160,40,0.10);
      transition:opacity 0.4s ease, transform 0.4s ease;
    }
    #panel.hidden { opacity:0; transform:translateY(12px); pointer-events:none; }
    #sceneType {
      font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
      color:#ffa040; margin-bottom:8px;
    }
    #title { font-size:clamp(22px,3vw,38px); font-weight:800; line-height:1.15; margin-bottom:8px; }
    #subtitle { font-size:clamp(12px,1.3vw,16px); color:#ffd79a; margin-bottom:14px; font-style:italic; }
    #bodyText { font-size:clamp(12px,1.1vw,15px); line-height:1.7; color:#e8e8e8; }
    #bodyText strong { color:#ffffff; font-weight:700; }

    #sceneCounter {
      position:fixed; top:18px; right:18px;
      padding:6px 14px; border-radius:999px;
      background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.13);
      font-size:12px; color:#bbb; pointer-events:none; z-index:11;
    }
    #credits {
      position:fixed; top:18px; left:18px;
      padding:6px 14px; border-radius:999px;
      background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.12);
      font-size:12px; color:#bbb; pointer-events:none; z-index:11;
    }
    #navHint {
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
      padding:6px 16px; border-radius:999px;
      background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.10);
      font-size:11px; color:#888; pointer-events:none; z-index:11;
    }

    /* ── FULLSCREEN IMAGE SCENES ── */
    #venusImageScene {
      position:fixed; inset:0; z-index:8;
      display:none; align-items:center; justify-content:center;
      background:#000;
    }
    #venusImageScene.active { display:flex; }
    #venusImg {
      width:100%; height:100%; object-fit:cover;
      opacity:0; transition:opacity 0.35s ease;
    }
    #venusImg.loaded { opacity:1; }
    #venusImgError {
      display:none; position:absolute; inset:0;
      align-items:center; justify-content:center;
      flex-direction:column; gap:14px;
      color:#888; font-size:15px;
    }
    #venusImageCaption {
      position:absolute; bottom:0; left:0; right:0;
      padding:80px 60px 36px;
      background:linear-gradient(transparent, rgba(0,0,0,0.88));
      line-height:1.6; color:#f0f0f0;
      font-size:clamp(13px,1.3vw,18px);
    }
    #venusImageCaption strong {
      display:block; font-size:clamp(17px,1.9vw,26px);
      color:#ffd79a; margin-bottom:8px;
    }
  </style>
</head>
<body>

<div id="overlay">
  <div id="panel">
    <div id="sceneType">Introduction</div>
    <div id="title">Exploring Venus</div>
    <div id="subtitle">Mission Plan by Quy Anh Nguyen and Huyen Tien</div>
    <div id="bodyText"></div>
  </div>
</div>

<div id="sceneCounter">Scene 1 / 20</div>
<div id="credits">Quy Anh Nguyen &bull; Huyen Tien</div>
<div id="navHint">Press Space or &rarr; to advance &nbsp;|&nbsp; &larr; to go back</div>

<div id="venusImageScene">
  <img id="venusImg" src="" alt="Venus"
       onerror="this.style.display='none';document.getElementById('venusImgError').style.display='flex'">
  <div id="venusImgError">
    <div style="font-size:52px">&#127756;</div>
    <div>Image not found &mdash; make sure the file is uploaded to GitHub</div>
  </div>
  <div id="venusImageCaption">
    <strong id="venusImgTitle"></strong>
    <span id="venusImgText"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ══════════════════════════════════════════════════════════
//  RENDERER
// ══════════════════════════════════════════════════════════
const scene3D = new THREE.Scene();
scene3D.fog = new THREE.FogExp2(0x000000, 0.00038);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 8000);
camera.position.set(22, 8, 24);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.055;
controls.enablePan = false; controls.minDistance = 5; controls.maxDistance = 350;
controls.rotateSpeed = 0.5; controls.zoomSpeed = 0.75;

// ══════════════════════════════════════════════════════════
//  LIGHTS
// ══════════════════════════════════════════════════════════
scene3D.add(new THREE.AmbientLight(0x18120a, 1.6));
const sunLight = new THREE.PointLight(0xfff0cc, 3.5, 5000);
sunLight.position.set(-150, 30, 0);
scene3D.add(sunLight);
const fillLight = new THREE.PointLight(0x2244aa, 0.35, 2500);
fillLight.position.set(250, -80, 80);
scene3D.add(fillLight);

// ══════════════════════════════════════════════════════════
//  TEXTURES
// ══════════════════════════════════════════════════════════
const TL = new THREE.TextureLoader();
const BP = "https://threejs.org/examples/textures/planets/";
const T = {
  mercury : TL.load(BP + "mercury.jpg"),
  venusS  : TL.load(BP + "venus.jpg"),
  venusA  : TL.load(BP + "venus_atmosphere.jpg"),
  earth   : TL.load(BP + "earth_atmos_2048.jpg"),
  earthC  : TL.load(BP + "earth_clouds_1024.png"),
  moon    : TL.load(BP + "moon_1024.jpg"),
  mars    : TL.load(BP + "mars_1k_color.jpg"),
  jupiter : TL.load(BP + "jupiter.jpg"),
  saturn  : TL.load(BP + "saturn.jpg"),
  saturnR : TL.load(BP + "saturnringcolor.jpg"),
  uranus  : TL.load(BP + "uranus.jpg"),
  neptune : TL.load(BP + "neptune.jpg"),
};

// ══════════════════════════════════════════════════════════
//  STARS
// ══════════════════════════════════════════════════════════
(function() {
  var N = 6000, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  for (var i = 0; i < N; i++) {
    var r = 1800, w = Math.random();
    pos[i*3]   = (Math.random() - 0.5) * r * 2;
    pos[i*3+1] = (Math.random() - 0.5) * r * 2;
    pos[i*3+2] = (Math.random() - 0.5) * r * 2;
    col[i*3]   = 0.8 + w * 0.2;
    col[i*3+1] = 0.82 + w * 0.1;
    col[i*3+2] = 0.9 + (1 - w) * 0.1;
  }
  var g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  g.setAttribute("color",    new THREE.BufferAttribute(col, 3));
  window._stars = new THREE.Points(g, new THREE.PointsMaterial({ size: 1.05, sizeAttenuation: true, vertexColors: true }));
  scene3D.add(window._stars);
})();

// ══════════════════════════════════════════════════════════
//  SUN
// ══════════════════════════════════════════════════════════
(function() {
  var g = new THREE.Group();
  var SP = new THREE.Vector3(-150, 30, 0);
  var sunMesh = new THREE.Mesh(new THREE.SphereGeometry(13, 48, 48), new THREE.MeshBasicMaterial({ color: 0xffe066 }));
  sunMesh.position.copy(SP); g.add(sunMesh);
  var coronaData = [[18, 0.22, 0xffaa22], [23, 0.10, 0xff8800], [30, 0.04, 0xff5500]];
  for (var i = 0; i < coronaData.length; i++) {
    var c = new THREE.Mesh(new THREE.SphereGeometry(coronaData[i][0], 32, 32), new THREE.MeshBasicMaterial({ color: coronaData[i][2], transparent: true, opacity: coronaData[i][1] }));
    c.position.copy(SP); g.add(c);
  }
  scene3D.add(g);
})();

// ══════════════════════════════════════════════════════════
//  PLANETS
// ══════════════════════════════════════════════════════════
var pg = new THREE.Group(); scene3D.add(pg);

function mkPlanet(r, tex, x, rough, metal) {
  var m = new THREE.Mesh(
    new THREE.SphereGeometry(r, 80, 80),
    new THREE.MeshStandardMaterial({ map: tex, roughness: rough !== undefined ? rough : 0.88, metalness: metal || 0 })
  );
  m.position.set(x, 0, 0); pg.add(m); return m;
}
function addGlow(parent, r, c, o) {
  parent.add(new THREE.Mesh(new THREE.SphereGeometry(r, 32, 32), new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: o, depthWrite: false })));
}

var mercury = mkPlanet(2.4, T.mercury, -72, 0.95);

var venus = new THREE.Mesh(new THREE.SphereGeometry(6.8, 128, 128), new THREE.MeshStandardMaterial({ map: T.venusS, roughness: 0.88 }));
venus.position.set(-42, 0, 0); pg.add(venus);
var venusAtmo = new THREE.Mesh(new THREE.SphereGeometry(7.05, 64, 64), new THREE.MeshStandardMaterial({ map: T.venusA, transparent: true, opacity: 0.72, roughness: 1, depthWrite: false }));
venus.add(venusAtmo);
addGlow(venus, 7.6, 0xffb84d, 0.18); addGlow(venus, 8.3, 0xff9020, 0.07); addGlow(venus, 9.1, 0xff6600, 0.03);

var earth = mkPlanet(7.2, T.earth, 0);
var earthCloud = new THREE.Mesh(new THREE.SphereGeometry(7.36, 64, 64), new THREE.MeshStandardMaterial({ map: T.earthC, transparent: true, opacity: 0.36, depthWrite: false }));
earth.add(earthCloud);
addGlow(earth, 7.85, 0x4499ff, 0.07);

var moon = new THREE.Mesh(new THREE.SphereGeometry(1.9, 32, 32), new THREE.MeshStandardMaterial({ map: T.moon, roughness: 0.95 }));
scene3D.add(moon);

var mars = mkPlanet(4.2, T.mars, 42, 0.92); addGlow(mars, 4.42, 0xcc5533, 0.06);
var jupiter = mkPlanet(11, T.jupiter, 114, 0.75);
var saturn = mkPlanet(9.4, T.saturn, 174, 0.80);

var saturnRingData = [{ i: 11.5, o: 14.5, op: 0.82 }, { i: 14.8, o: 17.5, op: 0.56 }, { i: 17.9, o: 19.4, op: 0.28 }];
for (var si = 0; si < saturnRingData.length; si++) {
  var sd = saturnRingData[si];
  var rg = new THREE.RingGeometry(sd.i, sd.o, 128);
  var rpos = rg.attributes.position, ruv = rg.attributes.uv;
  for (var ri = 0; ri < rpos.count; ri++) { var rx = rpos.getX(ri), rz = rpos.getZ(ri); ruv.setXY(ri, (Math.sqrt(rx*rx+rz*rz)-sd.i)/(sd.o-sd.i), 0); }
  var sring = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({ map: T.saturnR, side: THREE.DoubleSide, transparent: true, opacity: sd.op }));
  sring.rotation.x = Math.PI / 2.5; saturn.add(sring);
}

var uranus = mkPlanet(7.6, T.uranus, 234, 0.60, 0.05); addGlow(uranus, 8.1, 0x88ddcc, 0.06);
var uRing = new THREE.Mesh(new THREE.RingGeometry(9.4, 10.8, 64), new THREE.MeshBasicMaterial({ color: 0xaacccc, side: THREE.DoubleSide, transparent: true, opacity: 0.20 }));
uRing.rotation.x = Math.PI / 2; uRing.rotation.z = Math.PI / 1.4; uranus.add(uRing);

var neptune = mkPlanet(7.4, T.neptune, 294, 0.65, 0.05); addGlow(neptune, 7.9, 0x3355ff, 0.07);

// ══════════════════════════════════════════════════════════
//  SPACECRAFT
// ══════════════════════════════════════════════════════════
function makeRocket() {
  var g = new THREE.Group();
  var Msilver = new THREE.MeshStandardMaterial({ color: 0xdde0e8, roughness: 0.45, metalness: 0.72 });
  var Mred    = new THREE.MeshStandardMaterial({ color: 0xff3322, roughness: 0.5,  metalness: 0.3  });
  var Mdark   = new THREE.MeshStandardMaterial({ color: 0x2a2a35, roughness: 0.6,  metalness: 0.55 });
  var Mgold   = new THREE.MeshStandardMaterial({ color: 0xffbb33, roughness: 0.4,  metalness: 0.65 });

  var s1 = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.40, 1.60, 24), Msilver); s1.position.set(0, -0.35, 0); g.add(s1);
  var ist = new THREE.Mesh(new THREE.CylinderGeometry(0.40, 0.40, 0.10, 24), Mdark);  ist.position.set(0, 0.50, 0); g.add(ist);
  var s2 = new THREE.Mesh(new THREE.CylinderGeometry(0.30, 0.38, 1.05, 24), Msilver); s2.position.set(0, 1.12, 0); g.add(s2);
  var s3 = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.30, 0.75, 24), Msilver); s3.position.set(0, 1.96, 0); g.add(s3);
  var nose = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.78, 24), Mred); nose.position.set(0, 2.73, 0); g.add(nose);
  var therm = new THREE.Mesh(new THREE.CylinderGeometry(0.31, 0.31, 0.16, 24), Mgold); therm.position.set(0, 1.73, 0); g.add(therm);
  var f1 = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.23, 0.60, 24, 1, false, 0, Math.PI), Mred); f1.position.set(0, 2.35, 0); g.add(f1);
  var f2 = f1.clone(); f2.rotation.y = Math.PI; g.add(f2);
  var win = new THREE.Mesh(new THREE.CircleGeometry(0.075, 16), new THREE.MeshBasicMaterial({ color: 0x88ccff })); win.position.set(0.31, 1.95, 0); win.rotation.y = Math.PI / 2; g.add(win);

  for (var i = 0; i < 4; i++) {
    var fin = new THREE.Mesh(new THREE.BoxGeometry(0.028, 0.30, 0.24), Mdark);
    fin.position.set(Math.cos(i*Math.PI/2)*0.43, 0.18, Math.sin(i*Math.PI/2)*0.43);
    fin.rotation.y = i * Math.PI / 2; g.add(fin);
  }
  for (var i = 0; i < 4; i++) {
    var leg = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.62, 8), Msilver);
    var ang = i * Math.PI / 2 + Math.PI / 4;
    leg.position.set(Math.cos(ang)*0.38, -0.98, Math.sin(ang)*0.38);
    leg.rotation.z =  Math.cos(ang) * 0.50;
    leg.rotation.x = -Math.sin(ang) * 0.50;
    g.add(leg);
  }
  for (var i = 0; i < 3; i++) {
    var bell = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.17, 0.24, 16, 1, true), Mdark);
    bell.position.set(Math.cos(i*Math.PI*2/3)*0.19, -1.23, Math.sin(i*Math.PI*2/3)*0.19);
    g.add(bell);
  }
  g.visible = false; scene3D.add(g); return g;
}

function makeOrbiter() {
  var g = new THREE.Group();
  var Msilver = new THREE.MeshStandardMaterial({ color: 0xc8cdd8, roughness: 0.3,  metalness: 0.80 });
  var Mgold   = new THREE.MeshStandardMaterial({ color: 0xffcc44, roughness: 0.35, metalness: 0.72 });
  var Mdark   = new THREE.MeshStandardMaterial({ color: 0x22222e, roughness: 0.5,  metalness: 0.6  });
  var Mblue   = new THREE.MeshStandardMaterial({ color: 0x1144cc, roughness: 0.2,  metalness: 0.5  });
  var Mwhite  = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.6 });

  var body = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.0, 0.75, 6), Msilver); g.add(body);
  var topP = new THREE.Mesh(new THREE.CylinderGeometry(1.02, 1.02, 0.08, 6), Mgold); topP.position.y = 0.42; g.add(topP);
  var botP = topP.clone(); botP.position.y = -0.42; g.add(botP);

  var dishRim = new THREE.Mesh(new THREE.TorusGeometry(0.90, 0.05, 12, 40), Msilver); dishRim.rotation.x = Math.PI/2; dishRim.position.set(0, 0, 2.4); g.add(dishRim);
  var dishSurf = new THREE.Mesh(new THREE.SphereGeometry(0.90, 24, 24, 0, Math.PI*2, 0, Math.PI/3), new THREE.MeshStandardMaterial({ color: 0xddddee, roughness: 0.3, metalness: 0.6, side: THREE.DoubleSide }));
  dishSurf.rotation.x = -Math.PI/2; dishSurf.position.set(0, 0, 2.4); g.add(dishSurf);
  var dishFeed = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.55, 8), Msilver); dishFeed.position.set(0, 0.35, 2.4); g.add(dishFeed);
  for (var i = 0; i < 3; i++) {
    var ds = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.95, 6), Msilver);
    ds.position.set(Math.cos(i*Math.PI*2/3)*0.35, 0.22, 2.0);
    ds.rotation.x = Math.PI/2 - 0.35; ds.rotation.z = i * Math.PI*2/3; g.add(ds);
  }

  for (var side = -1; side <= 1; side += 2) {
    var mast = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 2.6, 8), Msilver); mast.rotation.z = Math.PI/2; mast.position.set(side*1.9, 0, 0); g.add(mast);
    for (var p = 0; p < 2; p++) {
      var panel = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.042, 0.95), Mblue); panel.position.set(side*(2.6+p*1.95), 0, 0); g.add(panel);
      for (var row = -1; row <= 1; row++) {
        var gr = new THREE.Mesh(new THREE.BoxGeometry(1.79, 0.05, 0.035), new THREE.MeshBasicMaterial({ color: 0x223388 }));
        gr.position.set(side*(2.6+p*1.95), 0.04, row*0.30); g.add(gr);
      }
    }
  }

  var iBase = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.28, 0.55), Mdark); iBase.position.y = 0.58; g.add(iBase);
  for (var i = 0; i < 3; i++) {
    var inst = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.085, 0.24, 10), i < 2 ? Mdark : Mwhite); inst.position.set((i-1)*0.20, 0.85, 0); g.add(inst);
    var lens = new THREE.Mesh(new THREE.CircleGeometry(0.07, 12), new THREE.MeshBasicMaterial({ color: 0x88aacc })); lens.position.set((i-1)*0.20, 0.98, 0); lens.rotation.x = -Math.PI/2; g.add(lens);
  }
  for (var i = 0; i < 4; i++) {
    var thr = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.13, 0.20, 10, 1, true), Mdark);
    thr.position.set(Math.cos(i*Math.PI/2)*1.06, -0.32, Math.sin(i*Math.PI/2)*1.06);
    thr.rotation.x = Math.PI/2; thr.rotation.y = i*Math.PI/2; g.add(thr);
  }
  var boom = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 1.75, 6), Msilver); boom.rotation.z = Math.PI/2; boom.position.set(0, 0.38, -2.0); boom.rotation.x = -0.28; g.add(boom);
  var magH = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.20), Mdark); magH.position.set(0, 0.72, -3.0); g.add(magH);
  var tracker = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.28), Mdark); tracker.position.set(-0.86, 0.40, 0.38); tracker.rotation.z = 0.4; g.add(tracker);

  g.visible = false; scene3D.add(g); return g;
}

function makeProbe() {
  var g = new THREE.Group();
  var Msilver = new THREE.MeshStandardMaterial({ color: 0xbbbbcc, roughness: 0.4, metalness: 0.70 });
  var Mgold   = new THREE.MeshStandardMaterial({ color: 0xdd9922, roughness: 0.5, metalness: 0.62 });
  var Mdark   = new THREE.MeshStandardMaterial({ color: 0x101018, roughness: 0.72 });
  var Mheat   = new THREE.MeshStandardMaterial({ color: 0x4a2810, roughness: 0.92 });
  var Mwhite  = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.6  });

  var hs = new THREE.Mesh(new THREE.ConeGeometry(1.55, 0.85, 32), Mheat); hs.position.y = -1.0; hs.rotation.x = Math.PI; g.add(hs);
  var hsRim = new THREE.Mesh(new THREE.TorusGeometry(1.55, 0.09, 8, 40), Mheat); hsRim.position.y = -1.0; hsRim.rotation.x = Math.PI/2; g.add(hsRim);
  var vessel = new THREE.Mesh(new THREE.SphereGeometry(1.08, 40, 40), Msilver); vessel.position.y = 0.12; g.add(vessel);

  var bandYs = [-0.20, 0.14, 0.50];
  for (var i = 0; i < bandYs.length; i++) {
    var b = new THREE.Mesh(new THREE.TorusGeometry(1.09, 0.065, 8, 36), Mgold); b.position.y = bandYs[i]; b.rotation.x = Math.PI/2; g.add(b);
  }

  var bs = new THREE.Mesh(new THREE.SphereGeometry(1.12, 32, 32, 0, Math.PI*2, 0, Math.PI/2.2), Mwhite); bs.rotation.x = Math.PI; bs.position.y = 0.85; g.add(bs);
  var ct = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.20, 0.55, 16), Mdark); ct.position.y = 1.75; g.add(ct);
  var ctc = new THREE.Mesh(new THREE.ConeGeometry(0.21, 0.28, 16), Mdark); ctc.position.y = 2.15; g.add(ctc);

  var sensorData = [[0, 1.08, 0], [0.78, 0.65, 0.56], [-0.72, 0.38, 0.72]];
  for (var i = 0; i < sensorData.length; i++) {
    var s = new THREE.Mesh(new THREE.CylinderGeometry(0.072, 0.072, 0.28, 8), Mdark);
    s.position.set(sensorData[i][0], sensorData[i][1], sensorData[i][2]);
    s.lookAt(0, 0, 0); s.rotateX(Math.PI/2); g.add(s);
  }
  var ant = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.008, 1.55, 6), Msilver); ant.position.set(0.56, 1.58, 0); ant.rotation.z = 0.28; g.add(ant);

  g.visible = false; scene3D.add(g); return g;
}

var rocket  = makeRocket();
var orbiter = makeOrbiter();
var probe   = makeProbe();

// Travel arc Earth to Venus
var routePts = [];
for (var ri = 0; ri <= 80; ri++) {
  var t = ri / 80;
  var p0 = new THREE.Vector3(0, 0, 0), p1 = new THREE.Vector3(-21, 24, -14), p2 = new THREE.Vector3(-42, 0, 0);
  routePts.push(p0.clone().lerp(p1, t).lerp(p1.clone().lerp(p2, t), t));
}
var routeLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(routePts), new THREE.LineBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.48 }));
routeLine.visible = false; pg.add(routeLine);

var panel         = document.getElementById("panel");
var sceneTypeEl   = document.getElementById("sceneType");
var titleEl       = document.getElementById("title");
var subtitleEl    = document.getElementById("subtitle");
var bodyTextEl    = document.getElementById("bodyText");
var counterEl     = document.getElementById("sceneCounter");
var venusScene    = document.getElementById("venusImageScene");
var venusImg      = document.getElementById("venusImg");
var venusImgTitle = document.getElementById("venusImgTitle");
var venusImgText  = document.getElementById("venusImgText");

var cur = 0;
var camTarget  = SCENES[0].cam.clone();
var lookTarget = SCENES[0].look.clone();

// ── PRELOAD all venus images immediately so they are cached when needed ──
(function preloadImages() {
  var seen = {};
  for (var i = 0; i < SCENES.length; i++) {
    var s = SCENES[i];
    if (s.type === "venus" && s.imgSrc && !seen[s.imgSrc]) {
      seen[s.imgSrc] = true;
      var img = new Image();
      img.src = s.imgSrc;
    }
  }
})();

function goTo(i) {
  cur = Math.max(0, Math.min(i, SCENES.length - 1));
  var s = SCENES[cur];

  if (s.type === "venus") {
    venusImg.style.display = "block";
    document.getElementById("venusImgError").style.display = "none";
    venusImgTitle.textContent = s.imgTitle;
    venusImgText.textContent  = s.imgText;
    venusScene.classList.add("active");
    panel.classList.add("hidden");
    counterEl.textContent = "Scene " + (cur + 1) + " / " + SCENES.length;

    // If same src as already loaded, show instantly
    if (venusImg.src.endsWith(s.imgSrc) && venusImg.complete && venusImg.naturalWidth > 0) {
      venusImg.classList.add("loaded");
    } else {
      venusImg.classList.remove("loaded");
      venusImg.onload = function() { venusImg.classList.add("loaded"); };
      venusImg.src = s.imgSrc;
    }
    return;
  }

  // 3D space scene
  venusScene.classList.remove("active");
  camTarget.copy(s.cam);
  lookTarget.copy(s.look);
  if (s.enter) s.enter();

  panel.classList.add("hidden");
  setTimeout(function() {
    sceneTypeEl.textContent = s.category || "";
    titleEl.textContent     = s.title;
    subtitleEl.textContent  = s.subtitle || "";
    bodyTextEl.innerHTML    = s.text || "";
    counterEl.textContent   = "Scene " + (cur + 1) + " / " + SCENES.length;
    panel.classList.remove("hidden");
  }, 220);
}

goTo(0);

window.addEventListener("keydown", function(e) {
  if (e.code === "Space")      { e.preventDefault(); goTo(cur + 1); }
  if (e.code === "ArrowRight") { goTo(cur + 1); }
  if (e.code === "ArrowLeft")  { goTo(cur - 1); }
});
window.addEventListener("resize", function() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

//  ANIMATION
// ══════════════════════════════════════════════════════════
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();

  camera.position.lerp(camTarget, 0.030);
  controls.target.lerp(lookTarget, 0.045);
  controls.update();

  window._stars.rotation.y += 0.000055;

  mercury.rotation.y   += 0.0040;
  venus.rotation.y     += 0.0014;
  venusAtmo.rotation.y += 0.0028;
  earth.rotation.y     += 0.0068;
  earthCloud.rotation.y += 0.0088;
  mars.rotation.y      += 0.0050;
  jupiter.rotation.y   += 0.0160;
  saturn.rotation.y    += 0.0115;
  uranus.rotation.y    += 0.0078;
  neptune.rotation.y   += 0.0068;

  moon.position.set(
    earth.position.x + Math.cos(t * 1.1) * 13.5,
    Math.sin(t * 0.28) * 0.9,
    earth.position.z + Math.sin(t * 1.1) * 13.5
  );

  if (orbiter.visible) {
    orbiter.position.set(
      venus.position.x + Math.cos(t * 0.85) * 18,
      Math.sin(t * 0.55) * 4.5,
      Math.sin(t * 0.85) * 14
    );
    orbiter.lookAt(venus.position);
    orbiter.rotateZ(0.004);
  }

  if (probe.visible) {
    var s = SCENES[cur];
    if (s && s.category && s.category.indexOf("Probe") !== -1) {
      var dt     = (t * 0.55) % (Math.PI * 2);
      var alt    = 14 - (t * 0.9) % 18;
      var spr    = Math.max(0, alt * 0.55);
      probe.position.set(
        venus.position.x + Math.cos(dt) * spr,
        alt - 2,
        venus.position.z + Math.sin(dt) * spr * 0.4
      );
      probe.rotation.y += 0.012;
      probe.rotation.z  = Math.sin(t * 0.8) * 0.12;
    } else {
      var descend = 10 - (t * 1.1 % 12);
      probe.position.set(venus.position.x + 9, descend - 2, 2);
      probe.rotation.y += 0.008;
    }
  }

  if (rocket.visible) {
    if (cur === 0 || cur === 1) {
      rocket.position.set(
        earth.position.x + Math.cos(t * 0.42) * 12,
        Math.sin(t * 0.22) * 2,
        earth.position.z + Math.sin(t * 0.42) * 12
      );
      rocket.rotation.y += 0.010;
    } else if (cur === 8) {
      rocket.position.set(venus.position.x + 5, 8, 6);
      rocket.rotation.y += 0.008;
    } else if (cur === 9) {
      var tr = (Math.sin(t * 0.45) + 1) / 2;
      var p0 = new THREE.Vector3(0, 0, 0), p1 = new THREE.Vector3(-21, 24, -14), p2 = new THREE.Vector3(-42, 0, 0);
      var a = p0.clone().lerp(p1, tr), b = p1.clone().lerp(p2, tr);
      rocket.position.copy(a.lerp(b, tr));
      rocket.rotation.z = -0.65; rocket.rotation.y += 0.018;
    } else if (cur === 10) {
      rocket.position.set(
        earth.position.x + Math.cos(t * 0.38) * 10.5,
        Math.sin(t * 0.38) * 1.5 + 2,
        earth.position.z + Math.sin(t * 0.38) * 10.5
      );
      rocket.rotation.y += 0.012;
    }
  }

  renderer.render(scene3D, camera);
}

animate();
