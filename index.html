<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exploring Venus - Mission Plan</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 5vw;
    }

    #panel {
      max-width: 580px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 0 30px rgba(255,255,255,0.08);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #title {
      font-size: clamp(28px, 4vw, 50px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    #subtitle {
      font-size: clamp(15px, 1.6vw, 22px);
      color: #ffd79a;
      margin-bottom: 18px;
    }

    #bodyText {
      font-size: clamp(15px, 1.4vw, 20px);
      line-height: 1.6;
      color: #f3f3f3;
      white-space: pre-line;
    }

    #sceneCounter {
      position: fixed;
      top: 18px;
      right: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 13px;
      color: #ddd;
      pointer-events: none;
    }

    #credits {
      position: fixed;
      top: 18px;
      left: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 13px;
      color: #ddd;
      pointer-events: none;
    }

    .fadeOut {
      opacity: 0;
      transform: translateY(10px);
    }

    .choiceTag {
      color: #ffd79a;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="panel">
      <div id="title">Exploring Venus</div>
      <div id="subtitle">Mission Plan by Quy Anh Nguyen and Huyen Tien</div>
      <div id="bodyText"></div>
    </div>
  </div>

  <div id="sceneCounter">Scene 1 / 11</div>
  <div id="credits">Quy Anh Nguyen • Huyen Tien</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    // =========================
    // Basic setup
    // =========================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.00055);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      5000
    );
    camera.position.set(70, 18, 140);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // =========================
    // Texture loader
    // =========================
    const textureLoader = new THREE.TextureLoader();

    function loadTexture(url) {
      const tex = textureLoader.load(url);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // =========================
    // Lights
    // =========================
    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    const sunLight = new THREE.PointLight(0xffddaa, 2.8, 3000);
    sunLight.position.set(-140, 30, 0);
    scene.add(sunLight);

    // =========================
    // Stars
    // =========================
    function createStars(count = 3000) {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        const r = 1200;
        positions[i * 3 + 0] = (Math.random() - 0.5) * r * 2;
        positions[i * 3 + 1] = (Math.random() - 0.5) * r * 2;
        positions[i * 3 + 2] = (Math.random() - 0.5) * r * 2;
      }

      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.15,
        sizeAttenuation: true
      });

      const stars = new THREE.Points(geometry, material);
      scene.add(stars);
      return stars;
    }

    const stars = createStars();

    // =========================
    // Sun
    // =========================
    function makeSun() {
      const group = new THREE.Group();

      const sunGeo = new THREE.SphereGeometry(12, 48, 48);
      const sunMat = new THREE.MeshBasicMaterial({ color: 0xffbb55 });
      const sun = new THREE.Mesh(sunGeo, sunMat);
      sun.position.set(-140, 30, 0);

      const glowGeo = new THREE.SphereGeometry(16, 48, 48);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0xffaa33,
        transparent: true,
        opacity: 0.2
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.copy(sun.position);

      group.add(sun, glow);
      scene.add(group);
      return { group, sun, glow };
    }

    makeSun();

    // =========================
    // Planets
    // =========================
    const planetGroup = new THREE.Group();
    scene.add(planetGroup);

    function makePlanet(size, textureURL, x, normalURL = null) {
      const geo = new THREE.SphereGeometry(size, 64, 64);
      const matOptions = {
        map: loadTexture(textureURL),
        roughness: 1
      };

      if (normalURL) {
        matOptions.normalMap = loadTexture(normalURL);
      }

      const mat = new THREE.MeshStandardMaterial(matOptions);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, 0, 0);
      planetGroup.add(mesh);
      return mesh;
    }

    const mercury = makePlanet(
      2.4,
      "https://threejs.org/examples/textures/planets/mercury.jpg",
      -70
    );

    const venus = makePlanet(
      6.8,
      "https://threejs.org/examples/textures/planets/venus.jpg",
      -40
    );

    const earth = makePlanet(
      7.2,
      "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
      0
    );

    const mars = makePlanet(
      4.2,
      "https://threejs.org/examples/textures/planets/mars_1k_color.jpg",
      40
    );

    const jupiter = makePlanet(
      11,
      "https://threejs.org/examples/textures/planets/jupiter.jpg",
      110
    );

    const saturn = makePlanet(
      9.4,
      "https://threejs.org/examples/textures/planets/saturn.jpg",
      170
    );

    const uranus = makePlanet(
      7.6,
      "https://threejs.org/examples/textures/planets/uranus.jpg",
      230
    );

    const neptune = makePlanet(
      7.4,
      "https://threejs.org/examples/textures/planets/neptune.jpg",
      290
    );

    // Saturn ring
    const ringGeo = new THREE.RingGeometry(12, 18, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      map: loadTexture("https://threejs.org/examples/textures/planets/saturnringcolor.jpg"),
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.75
    });
    const saturnRing = new THREE.Mesh(ringGeo, ringMat);
    saturnRing.rotation.x = Math.PI / 2.5;
    saturn.add(saturnRing);

    // Earth moon
    const moon = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 24, 24),
      new THREE.MeshStandardMaterial({
        map: loadTexture("https://threejs.org/examples/textures/planets/moon_1024.jpg"),
        roughness: 1
      })
    );
    scene.add(moon);

    // Earth cloud layer
    const earthCloud = new THREE.Mesh(
      new THREE.SphereGeometry(7.35, 64, 64),
      new THREE.MeshStandardMaterial({
        map: loadTexture("https://threejs.org/examples/textures/planets/earth_clouds_1024.png"),
        transparent: true,
        opacity: 0.35,
        depthWrite: false
      })
    );
    earth.add(earthCloud);

    // Venus cloud layer
    const venusCloud = new THREE.Mesh(
      new THREE.SphereGeometry(7.15, 64, 64),
      new THREE.MeshStandardMaterial({
        map: loadTexture("https://threejs.org/examples/textures/planets/venus.jpg"),
        transparent: true,
        opacity: 0.18,
        depthWrite: false
      })
    );
    venus.add(venusCloud);

    // Venus glow
    const venusGlow = new THREE.Mesh(
      new THREE.SphereGeometry(8.3, 48, 48),
      new THREE.MeshBasicMaterial({
        color: 0xffb35c,
        transparent: true,
        opacity: 0.14
      })
    );
    venus.add(venusGlow);

    // =========================
    // Mission objects
    // =========================
    function makeOrbiter() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.4, 1.2, 1.2),
        new THREE.MeshStandardMaterial({ color: 0xbfc7d5, metalness: 0.3, roughness: 0.6 })
      );

      const panelLeft = new THREE.Mesh(
        new THREE.BoxGeometry(4.2, 0.12, 1.8),
        new THREE.MeshStandardMaterial({ color: 0x2c5aff, metalness: 0.2, roughness: 0.4 })
      );
      panelLeft.position.x = -3.6;

      const panelRight = panelLeft.clone();
      panelRight.position.x = 3.6;

      const antenna = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 2.2, 12),
        new THREE.MeshStandardMaterial({ color: 0xe6e6e6 })
      );
      antenna.rotation.z = Math.PI / 2;
      antenna.position.z = 1.2;

      group.add(body, panelLeft, panelRight, antenna);
      group.visible = false;
      scene.add(group);
      return group;
    }

    function makeProbe() {
      const group = new THREE.Group();

      const top = new THREE.Mesh(
        new THREE.ConeGeometry(1.1, 1.3, 24),
        new THREE.MeshStandardMaterial({ color: 0xd9d9d9, roughness: 0.8 })
      );
      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(1.2, 1.2, 1.4, 24),
        new THREE.MeshStandardMaterial({ color: 0xa67642, roughness: 0.85 })
      );
      base.position.y = -1.1;
      top.position.y = 0.2;

      group.add(top, base);
      group.visible = false;
      scene.add(group);
      return group;
    }

    function makeRocket() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.8, 0.8, 6, 20),
        new THREE.MeshStandardMaterial({ color: 0xe7e7e7, roughness: 0.7 })
      );

      const nose = new THREE.Mesh(
        new THREE.ConeGeometry(0.8, 1.8, 20),
        new THREE.MeshStandardMaterial({ color: 0xff5f5f, roughness: 0.6 })
      );
      nose.position.y = 3.9;

      const fin1 = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 1.2, 0.8),
        new THREE.MeshStandardMaterial({ color: 0xff7a7a })
      );
      fin1.position.set(0.75, -2.1, 0);

      const fin2 = fin1.clone();
      fin2.position.set(-0.75, -2.1, 0);

      const fin3 = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 1.2, 0.12),
        new THREE.MeshStandardMaterial({ color: 0xff7a7a })
      );
      fin3.position.set(0, -2.1, 0.75);

      const fin4 = fin3.clone();
      fin4.position.set(0, -2.1, -0.75);

      group.add(body, nose, fin1, fin2, fin3, fin4);
      group.visible = false;
      scene.add(group);
      return group;
    }

    const orbiter = makeOrbiter();
    const probe = makeProbe();
    const rocket = makeRocket();

    // Line from Earth to Venus
    const routeMaterial = new THREE.LineBasicMaterial({
      color: 0x88ccff,
      transparent: true,
      opacity: 0.55
    });
    const routePoints = [
      new THREE.Vector3(earth.position.x, earth.position.y, earth.position.z),
      new THREE.Vector3(-20, 18, -8),
      new THREE.Vector3(venus.position.x, venus.position.y, venus.position.z)
    ];
    const routeGeometry = new THREE.BufferGeometry().setFromPoints(routePoints);
    const routeLine = new THREE.Line(routeGeometry, routeMaterial);
    routeLine.visible = false;
    planetGroup.add(routeLine);

    // =========================
    // HTML refs
    // =========================
    const panel = document.getElementById("panel");
    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const bodyTextEl = document.getElementById("bodyText");
    const sceneCounterEl = document.getElementById("sceneCounter");

    // =========================
    // Scenes
    // =========================
    const scenes = [
      {
        title: "Exploring Venus",
        subtitle: "Mission Plan by Quy Anh Nguyen and Huyen Tien",
        text:
`Hello, today we are going to present our mission to explore Venus.
Venus is one of the most extreme planets in our Solar System.`,
        camPos: new THREE.Vector3(20, 8, 26),
        lookAt: new THREE.Vector3(earth.position.x, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = false;
          probe.visible = false;
          rocket.visible = true;
        }
      },
      {
        title: "Mission Preparation",
        subtitle: "Choosing what to bring from Earth",
        text:
`First, we prepare the mission on Earth.

We choose a rocket to launch the mission.
We also choose an orbiter and a probe.

The specialists we bring are:
- engineers
- scientists
- mission controllers`,
        camPos: new THREE.Vector3(16, 6, 18),
        lookAt: new THREE.Vector3(earth.position.x, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = false;
          probe.visible = false;
          rocket.visible = true;
        }
      },
      {
        title: "Why Explore Space?",
        subtitle: "Learning more about the universe",
        text:
`We explore space to learn more about the universe.
It helps us understand how planets are formed.
We can also discover new things that we do not know yet.
Space exploration also helps us improve technology on Earth.`,
        camPos: new THREE.Vector3(40, 30, 180),
        lookAt: new THREE.Vector3(40, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = false;
          probe.visible = false;
          rocket.visible = false;
        }
      },
      {
        title: "Why Venus?",
        subtitle: "A planet like Earth, but very different",
        text:
`Venus is interesting because it is similar to Earth in size.
But it is very different in many ways.
It has a thick atmosphere and it is extremely hot.
Studying Venus helps us understand why planets can change so much.`,
        camPos: new THREE.Vector3(-15, 12, 42),
        lookAt: new THREE.Vector3(venus.position.x, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = false;
          probe.visible = false;
          rocket.visible = false;
        }
      },
      {
        title: "What Can We Discover?",
        subtitle: "Atmosphere, surface, and volcanoes",
        text:
`On Venus, we can study the atmosphere and the weather.
We can also learn about the surface and possible volcanoes.
Scientists want to know if Venus had water in the past.
This can help us understand how planets change over time.`,
        camPos: new THREE.Vector3(-26, 8, 24),
        lookAt: new THREE.Vector3(venus.position.x, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = false;
          probe.visible = false;
          rocket.visible = false;
        }
      },
      {
        title: "Why Is It Difficult?",
        subtitle: "A very hard planet to explore",
        text:
`Venus is very hard to explore.
The temperature is extremely high.
The pressure is very strong.
The clouds are also toxic.
Because of this, spacecraft cannot stay there for a long time.`,
        camPos: new THREE.Vector3(-32, 6, 18),
        lookAt: new THREE.Vector3(venus.position.x, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = false;
          probe.visible = false;
          rocket.visible = false;
        }
      },
      {
        title: "Mission Plan",
        subtitle: "Travel from Earth to Venus",
        text:
`Our mission starts from Earth.
The spacecraft travels to Venus.
Then, it splits into two parts.
An orbiter stays around Venus, and a probe goes into the atmosphere.
The data is sent back to Earth.`,
        camPos: new THREE.Vector3(-8, 22, 85),
        lookAt: new THREE.Vector3(-18, 2, 0),
        onEnter: () => {
          routeLine.visible = true;
          orbiter.visible = true;
          probe.visible = true;
          rocket.visible = true;
        }
      },
      {
        title: "The Orbiter",
        subtitle: "Studying Venus from space",
        text:
`The orbiter stays around Venus.
It studies the planet from space.
It can map the surface and observe changes.
It also sends information back to Earth.`,
        camPos: new THREE.Vector3(-20, 10, 20),
        lookAt: new THREE.Vector3(venus.position.x, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = true;
          probe.visible = false;
          rocket.visible = false;
        }
      },
      {
        title: "The Probe",
        subtitle: "Going down into the atmosphere",
        text:
`The probe goes down into the atmosphere.
It measures temperature and pressure.
It studies the gases and clouds.
It sends data while it is going down.`,
        camPos: new THREE.Vector3(-34, 4, 15),
        lookAt: new THREE.Vector3(venus.position.x, -2, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = false;
          probe.visible = true;
          rocket.visible = false;
        }
      },
      {
        title: "Why This Mission Matters",
        subtitle: "Venus can teach us about Earth",
        text:
`This mission is important because it helps us understand Earth.
By studying Venus, we can learn about climate and how planets change.
It also helps scientists study other planets in the future.`,
        camPos: new THREE.Vector3(-5, 10, 50),
        lookAt: new THREE.Vector3(-20, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = true;
          probe.visible = false;
          rocket.visible = false;
        }
      },
      {
        title: "Conclusion",
        subtitle: "Venus is dangerous, but important",
        text:
`In conclusion, Venus is an important planet to study.
Even if it is very dangerous, it can teach us a lot.
Exploring Venus helps us understand our planet and the universe better.`,
        camPos: new THREE.Vector3(10, 18, 95),
        lookAt: new THREE.Vector3(venus.position.x, 0, 0),
        onEnter: () => {
          routeLine.visible = false;
          orbiter.visible = true;
          probe.visible = true;
          rocket.visible = false;
        }
      }
    ];

    let currentScene = 0;

    const camTargetPos = new THREE.Vector3().copy(scenes[0].camPos);
    const camLookTarget = new THREE.Vector3().copy(scenes[0].lookAt);

    function updateText(sceneData) {
      panel.classList.add("fadeOut");

      setTimeout(() => {
        titleEl.textContent = sceneData.title;
        subtitleEl.textContent = sceneData.subtitle;
        bodyTextEl.textContent = sceneData.text;
        sceneCounterEl.textContent = `Scene ${currentScene + 1} / ${scenes.length}`;
        panel.classList.remove("fadeOut");
      }, 220);
    }

    function goToScene(index) {
      currentScene = index;
      const s = scenes[index];

      camTargetPos.copy(s.camPos);
      camLookTarget.copy(s.lookAt);

      if (s.onEnter) s.onEnter();
      updateText(s);
    }

    goToScene(0);

    // =========================
    // Keyboard controls
    // =========================
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        let next = currentScene + 1;
        if (next >= scenes.length) next = 0;
        goToScene(next);
      }

      if (e.code === "ArrowRight") {
        const next = Math.min(currentScene + 1, scenes.length - 1);
        goToScene(next);
      }

      if (e.code === "ArrowLeft") {
        const prev = Math.max(currentScene - 1, 0);
        goToScene(prev);
      }
    });

    // =========================
    // Resize
    // =========================
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // =========================
    // Animation
    // =========================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Smooth camera movement
      camera.position.lerp(camTargetPos, 0.035);
      camera.lookAt(camLookTarget);

      // Gentle star rotation
      stars.rotation.y += 0.00008;

      // Rotate planets
      mercury.rotation.y += 0.004;
      venus.rotation.y += 0.0028;
      earth.rotation.y += 0.008;
      mars.rotation.y += 0.005;
      jupiter.rotation.y += 0.014;
      saturn.rotation.y += 0.011;
      uranus.rotation.y += 0.008;
      neptune.rotation.y += 0.008;

      earthCloud.rotation.y += 0.010;
      venusCloud.rotation.y += 0.0045;
      venusGlow.scale.setScalar(2 + Math.sin(t * 2.0) * 0.03);

      // Moon orbit around Earth
      moon.position.set(
        earth.position.x + Math.cos(t * 1.2) * 12,
        0,
        earth.position.z + Math.sin(t * 1.2) * 12
      );

      // Rocket near Earth scenes
      if (rocket.visible) {
        if (currentScene <= 1) {
          rocket.position.set(earth.position.x + 10, 0, 0);
          rocket.rotation.z = -0.2;
          rocket.rotation.y += 0.01;
        } else if (currentScene === 6) {
          const travelT = (Math.sin(t * 0.6) + 1) / 2;
          const start = new THREE.Vector3(earth.position.x, 0, 0);
          const mid = new THREE.Vector3(-20, 18, -8);
          const end = new THREE.Vector3(venus.position.x, 0, 0);

          const a = start.clone().lerp(mid, travelT);
          const b = mid.clone().lerp(end, travelT);
          const pos = a.lerp(b, travelT);

          rocket.position.copy(pos);
          rocket.rotation.z = -0.9;
          rocket.rotation.y += 0.03;
        }
      }

      // Orbiter around Venus
      if (orbiter.visible) {
        const r = 16;
        orbiter.position.set(
          venus.position.x + Math.cos(t * 1.1) * r,
          Math.sin(t * 1.7) * 2,
          Math.sin(t * 1.1) * r
        );
        orbiter.lookAt(venus.position);
      }

      // Probe near Venus
      if (probe.visible) {
        const descend = 8 - ((t * 1.4) % 10);
        probe.position.set(venus.position.x + 10, descend - 3, 0);
        probe.rotation.z = -0.2;
        probe.rotation.y += 0.01;
      }

      // Small breathing effect for panel
      panel.style.boxShadow = `0 0 ${22 + Math.sin(t * 2) * 6}px rgba(255,255,255,0.08)`;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
