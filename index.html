<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exploring Venus</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

#panel {
  position: absolute;
  left: 40px;
  top: 40px;
  max-width: 500px;
  background: rgba(0,0,0,0.5);
  padding: 20px;
  border-radius: 15px;
}

#title {
  font-size: 40px;
  font-weight: bold;
}

#subtitle {
  color: orange;
  margin-bottom: 10px;
}

#sceneCounter {
  position: absolute;
  top: 10px;
  right: 10px;
}
</style>
</head>

<body>

<div id="panel">
  <div id="title"></div>
  <div id="subtitle"></div>
  <div id="bodyText"></div>
</div>

<div id="sceneCounter"></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(30,10,50);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.3));
const light = new THREE.PointLight(0xffcc88,2);
light.position.set(-100,0,0);
scene.add(light);

// TEXTURE
const loader = new THREE.TextureLoader();

// PLANETS
function makePlanet(size, tex, x){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(size,64,64),
    new THREE.MeshStandardMaterial({map:loader.load(tex)})
  );
  mesh.position.x = x;
  scene.add(mesh);
  return mesh;
}

const earth = makePlanet(7,
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",0);

// ===== VENUS FIXED =====
const venusTex = loader.load("https://threejs.org/examples/textures/planets/venus.jpg");

const venus = new THREE.Mesh(
  new THREE.SphereGeometry(6.8,96,96),
  new THREE.MeshStandardMaterial({map:venusTex})
);
venus.position.x = -20;
scene.add(venus);

// clouds
const venusCloud = new THREE.Mesh(
  new THREE.SphereGeometry(7,96,96),
  new THREE.MeshStandardMaterial({
    map:venusTex,
    transparent:true,
    opacity:0.2
  })
);
venus.add(venusCloud);

// glow
const venusGlow = new THREE.Mesh(
  new THREE.SphereGeometry(7.5,64,64),
  new THREE.MeshBasicMaterial({
    color:0xffb35c,
    transparent:true,
    opacity:0.15
  })
);
venus.add(venusGlow);

// haze
const venusHaze = new THREE.Mesh(
  new THREE.SphereGeometry(8,64,64),
  new THREE.MeshBasicMaterial({
    color:0xffd6a0,
    transparent:true,
    opacity:0.05
  })
);
venus.add(venusHaze);

// UI
const titleEl = document.getElementById("title");
const subtitleEl = document.getElementById("subtitle");
const bodyEl = document.getElementById("bodyText");
const counter = document.getElementById("sceneCounter");

// SCENES
const scenes = [
{
title:"Exploring Venus",
subtitle:"Mission Plan by Quy Anh Nguyen and Huyen Tien",
text:`Hello, today we present our mission to explore Venus.`,
cam:new THREE.Vector3(10,5,20)
},
{
title:"Mission Preparation",
subtitle:"On Earth",
text:`We choose a rocket, orbiter and probe.
We bring engineers and scientists.`,
cam:new THREE.Vector3(10,5,15)
},
{
title:"Why Explore Space?",
subtitle:"",
text:`We explore space to learn about planets and the universe.`,
cam:new THREE.Vector3(40,20,100)
},
{
title:"Why Venus?",
subtitle:"",
text:`Venus is similar to Earth but very different.`,
cam:new THREE.Vector3(-10,5,25)
}
];

let i=0;

function update(){
  const s=scenes[i];
  titleEl.textContent=s.title;
  subtitleEl.textContent=s.subtitle;
  bodyEl.textContent=s.text;
  counter.textContent=`Scene ${i+1}/${scenes.length}`;
  camera.position.copy(s.cam);
}

update();

// CONTROLS
window.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    i=(i+1)%scenes.length;
    update();
  }
});

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y+=0.01;
  venus.rotation.y+=0.002;
  venusCloud.rotation.y+=0.003;

  const pulse=Math.sin(Date.now()*0.002)*0.03;
  venusGlow.scale.setScalar(1+pulse);
  venusHaze.scale.setScalar(1+pulse*0.5);

  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
