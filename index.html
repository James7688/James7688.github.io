<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exploring Venus - Mission Plan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:black;color:white;font-family:Arial;}

#panel{
position:absolute;
left:40px;top:40px;
max-width:520px;
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:15px;
}

#venusImages{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:none;
gap:10px;
}

#venusImages img{
width:140px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="panel">
<div id="title"></div>
<div id="subtitle"></div>
<div id="bodyText"></div>
</div>

<div id="venusImages">
<img src="venus1.jpg">
<img src="venus2.jpg">
<img src="venus3.jpg">
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,0.00055);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,5000);
camera.position.set(18,6,20);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 🔥 camera drag
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.3));
const light=new THREE.PointLight(0xffcc88,2);
light.position.set(-140,30,0);
scene.add(light);

// loader
const loader=new THREE.TextureLoader();
function loadTexture(u){return loader.load(u);}

// stars
const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(3000*3);
for(let i=0;i<3000;i++){
starPos[i*3]=(Math.random()-0.5)*2000;
starPos[i*3+1]=(Math.random()-0.5)*2000;
starPos[i*3+2]=(Math.random()-0.5)*2000;
}
starGeo.setAttribute("position",new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({size:1.2})));

// planets
function makePlanet(s,t,x){
const m=new THREE.Mesh(
new THREE.SphereGeometry(s,64,64),
new THREE.MeshStandardMaterial({map:loadTexture(t)})
);
m.position.x=x;
scene.add(m);
return m;
}

const earth=makePlanet(7,"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",0);

// ===== VENUS (FULL FIXED + REALISTIC) =====
const vTex=loadTexture("https://threejs.org/examples/textures/planets/venus.jpg");

const venus=new THREE.Mesh(
new THREE.SphereGeometry(6.8,128,128),
new THREE.MeshStandardMaterial({map:vTex,roughness:1})
);
venus.position.x=-40;
scene.add(venus);

const venusCloud=new THREE.Mesh(
new THREE.SphereGeometry(7,128,128),
new THREE.MeshStandardMaterial({
map:vTex,transparent:true,opacity:0.25,depthWrite:false
})
);
venus.add(venusCloud);

const venusGlow=new THREE.Mesh(
new THREE.SphereGeometry(7.8,64,64),
new THREE.MeshBasicMaterial({color:0xffb35c,transparent:true,opacity:0.2})
);
venus.add(venusGlow);

const venusHaze=new THREE.Mesh(
new THREE.SphereGeometry(8.2,64,64),
new THREE.MeshBasicMaterial({color:0xffd6a0,transparent:true,opacity:0.06})
);
venus.add(venusHaze);

// UI
const title=document.getElementById("title");
const subtitle=document.getElementById("subtitle");
const body=document.getElementById("bodyText");
const images=document.getElementById("venusImages");

// scenes
const scenes=[
{
title:"Mission Preparation",
subtitle:"Mission Plan by Quy Anh Nguyen and Huyen Tien",
text:`We choose spacecraft and specialists.`,
cam:new THREE.Vector3(18,6,20)
},
{
title:"Why Venus?",
subtitle:"",
text:`Venus is very hot and extreme.`,
cam:new THREE.Vector3(-30,6,15),
venusZoom:true
},
{
title:"Conclusion",
subtitle:"",
text:`Thank you for listening to us.`,
cam:new THREE.Vector3(10,10,40)
}
];

let i=0;

function update(){
const s=scenes[i];
title.textContent=s.title;
subtitle.textContent=s.subtitle;
body.textContent=s.text;
camera.position.copy(s.cam);

images.style.display=s.venusZoom?"flex":"none";
}

update();

window.addEventListener("keydown",e=>{
if(e.code==="Space"){
i=(i+1)%scenes.length;
update();
}
});

// animate
function animate(){
requestAnimationFrame(animate);

controls.update();

earth.rotation.y+=0.01;
venus.rotation.y+=0.0018;
venusCloud.rotation.y+=0.0025;

const pulse=Math.sin(Date.now()*0.002)*0.03;
venusGlow.scale.setScalar(1+pulse);
venusHaze.scale.setScalar(1+pulse*0.6);

renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
